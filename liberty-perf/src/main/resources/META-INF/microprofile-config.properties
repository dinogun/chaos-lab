# ──────────────────────────────────────────────────────────
# MicroProfile Config properties
# All values can be overridden via environment variables.
# Liberty maps env vars with dots replaced by underscores,
# or via explicit MP_CONFIG_ prefixed vars.
# ──────────────────────────────────────────────────────────

# ── Chaos: Connection-leak knobs ──────────────────────────
# Set to true to intentionally NOT return DB connections to the pool
# Expose connection starvation under moderate load.
chaos.db.leak.enabled=${CHAOS_DB_LEAK_ENABLED:false}

# Artificial per-query sleep in milliseconds (0 = disabled)
chaos.db.slow.query.ms=${CHAOS_DB_SLOW_QUERY_MS:0}

# ── Chaos: Memory-leak knobs ──────────────────────────────
# Set to true to cache transaction responses in a never-evicted map
chaos.memory.response.cache.enabled=${CHAOS_MEMORY_CACHE_ENABLED:false}

# Number of 64KB objects allocated and leaked per transaction when cache is on
chaos.memory.objects.per.tx=${CHAOS_MEMORY_OBJECTS_PER_TX:1}

# ── Chaos: HTTP large-response knobs ──────────────────────
# When true, every API response is padded with a configurable byte payload.
# The padding is serialised as a Base64 string field in the JSON response body,
# so Liberty must buffer it fully in heap on each live HTTP thread before
# flushing the response over the wire.  With keep-alive connections holding the
# socket open (HTTP_PERSIST_TIMEOUT_S) the heap is not reclaimed until the
# connection is closed, reproducing HTTP-misconfiguration-driven memory pressure
# without requiring an explicit cache or background leak.
chaos.http.large.response.enabled=${CHAOS_HTTP_LARGE_RESPONSE_ENABLED:true}

# Size of the padding blob per response, in kilobytes.
# At 50 concurrent users each holding a 256 KB response on a 60-second
# keep-alive window: 50 * 256 KB = ~12.5 MB live heap per second of load.
# With the default 384 MB JVM heap (512 Mi limit, 75% MaxRAMPercentage) and
# Liberty's own footprint, this reproduces OOM in a few minutes of sustained load.
chaos.http.large.response.kb=${CHAOS_HTTP_LARGE_RESPONSE_KB:256}
