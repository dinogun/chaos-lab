---
# ============================================================
# ConfigMap — server.xml + jvm.options with JVM logging enabled.
# Both files are mounted into the Liberty server config directory:
#   server.xml   → /opt/wlp/usr/servers/defaultServer/server.xml
#   jvm.options  → /opt/wlp/usr/servers/defaultServer/jvm.options
# jvm.options is the standard Liberty mechanism for JVM arguments;
# it is read by the server script before the JVM is launched.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: liberty-perf-server-xml
  namespace: chaos-test
  labels:
    app: liberty-perf
data:
  # ── jvm.options ──────────────────────────────────────────────────────────────
  # Standard Liberty JVM arguments file.  One flag per line; blank lines and
  # lines starting with # are ignored.  Liberty appends these to the JVM
  # command line before launching the server process.
  jvm.options: |
    # ── Verbose GC ─────────────────────────────────────────────────────────────
    # OpenJ9 XML GC log: 4 rotating files, wraps every 20 000 GC cycles.
    # Produces verbosegc.001.log … verbosegc.004.log under /logs.
    -Xverbosegclog:/logs/verbosegc.%seq.log,4,20000

    # ── JIT compilation trace ───────────────────────────────────────────────────
    # One line per method compile / recompile.
    # Capped at 50 MB; the file stops growing beyond that limit.
    -Xjit:verbose={compileStart|compileEnd|recompile|methodRecompilationFailed},vlog=/logs/jit.log,limit=52428800

    # ── Class-loading ───────────────────────────────────────────────────────────
    # Prints one line to stdout for every class dynamically loaded/unloaded.
    # Captured by the pod log collector alongside Liberty's structured output.
    -verbose:dynload

    # ── Thread dump on SIGQUIT / crash / abort ──────────────────────────────────
    -Xdump:java:events=user+gpf+abort,file=/dumps/javacore.%Y%m%d.%H%M%S.%pid.txt

    # ── Heap dump on OutOfMemoryError ───────────────────────────────────────────
    -Xdump:heap:events=systhrow+throw,filter=java/lang/OutOfMemoryError,file=/dumps/heapdump.%Y%m%d.%H%M%S.%pid.phd

  server.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <server description="Liberty Performance Benchmark Server">

        <featureManager>
            <feature>microProfile-6.1</feature>
            <feature>restfulWS-3.1</feature>
            <feature>jsonb-3.0</feature>
            <feature>jsonp-2.1</feature>
            <feature>concurrent-3.0</feature>
            <feature>jdbc-4.3</feature>
            <feature>mpHealth-4.0</feature>
            <feature>mpMetrics-5.1</feature>
            <feature>mpConfig-3.1</feature>
            <feature>mpOpenAPI-3.1</feature>
            <feature>cdi-4.0</feature>
            <feature>logstashCollector-1.0</feature>
        </featureManager>

        <variable name="default.http.port"           defaultValue="9080"/>
        <variable name="default.https.port"          defaultValue="9443"/>
        <variable name="app.location"                defaultValue="liberty-perf.war"/>
        <variable name="THREAD_POOL_CORE"            defaultValue="20"/>
        <variable name="THREAD_POOL_MAX"             defaultValue="200"/>
        <variable name="DB_MAX_POOL_SIZE"            defaultValue="20"/>
        <variable name="DB_MIN_POOL_SIZE"            defaultValue="2"/>
        <variable name="DB_CONNECTION_TIMEOUT_MS"    defaultValue="5000"/>
        <variable name="DB_MAX_IDLE_TIME_S"          defaultValue="60"/>
        <variable name="DB_REAP_TIME_S"              defaultValue="180"/>
        <variable name="DB_AGED_TIMEOUT_S"           defaultValue="3600"/>
        <variable name="HTTP_MAX_KEEPALIVE_REQUESTS" defaultValue="200"/>
        <variable name="HTTP_PERSIST_TIMEOUT_S"      defaultValue="30"/>

        <httpEndpoint id="defaultHttpEndpoint"
                      host="*"
                      httpPort="${default.http.port}"
                      httpsPort="${default.https.port}">
            <tcpOptions soReuseAddr="true"/>
            <httpOptions maxKeepAliveRequests="${HTTP_MAX_KEEPALIVE_REQUESTS}"
                         persistTimeout="${HTTP_PERSIST_TIMEOUT_S}"/>
        </httpEndpoint>

        <executor name="LibertyThreadPool"
                  coreThreads="${THREAD_POOL_CORE}"
                  maxThreads="${THREAD_POOL_MAX}"/>

        <library id="h2Lib">
            <fileset dir="${shared.resource.dir}" includes="h2-*.jar"/>
        </library>

        <dataSource id="DefaultDataSource"
                    jndiName="jdbc/libertyPerfDS"
                    type="javax.sql.DataSource"
                    statementCacheSize="10">
            <jdbcDriver libraryRef="h2Lib"/>
            <properties
                url="jdbc:h2:mem:libertyPerfDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
                user="sa"
                password=""/>
            <connectionManager
                maxPoolSize="${DB_MAX_POOL_SIZE}"
                minPoolSize="${DB_MIN_POOL_SIZE}"
                connectionTimeout="${DB_CONNECTION_TIMEOUT_MS}"
                maxIdleTime="${DB_MAX_IDLE_TIME_S}"
                reapTime="${DB_REAP_TIME_S}"
                agedTimeout="${DB_AGED_TIMEOUT_S}"
                purgePolicy="FailingConnectionOnly"/>
        </dataSource>

        <webApplication id="liberty-perf"
                        location="${app.location}"
                        contextRoot="/"/>

        <!-- ============================================================
             Logging — structured JSON + elevated trace for JVM subsystems:
               WAS.j2c*              — JDBC connection pool lifecycle
               com.ibm.ws.threading* — Liberty executor / thread pool
               com.ibm.ws.jca*       — JCA connector layer
               com.ibm.ws.kernel*    — server start/stop lifecycle
             All other components remain at INFO to avoid flooding.
             ============================================================ -->
        <logging
            messageFormat="json"
            consoleFormat="json"
            consoleLogLevel="INFO"
            traceSpecification="*=info:WAS.j2c*=fine:com.ibm.ws.threading*=fine:com.ibm.ws.jca*=fine:com.ibm.ws.kernel.launch*=fine"
            maxFileSize="100"
            maxFiles="5"
            isoDateFormat="true"
            traceFileName="trace.log"
            logDirectory="/logs"/>

    </server>
---
# ============================================================
# Namespace
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: chaos-test
  labels:
    app.kubernetes.io/part-of: chaos-lab
---
# ============================================================
# ConfigMap — externalised application settings
# Override values here without rebuilding the image.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: liberty-perf-config
  namespace: chaos-test
  labels:
    app: liberty-perf
data:
  # ── Thread pool ──────────────────────────────────────────
  THREAD_POOL_CORE: "20"
  THREAD_POOL_MAX: "200"

  # ── DB connection pool ───────────────────────────────────
  # Reduce DB_MAX_POOL_SIZE to trigger connection starvation
  DB_MAX_POOL_SIZE: "20"
  DB_MIN_POOL_SIZE: "2"
  DB_CONNECTION_TIMEOUT_MS: "5000"
  DB_MAX_IDLE_TIME_S: "60"
  DB_REAP_TIME_S: "180"
  DB_AGED_TIMEOUT_S: "3600"

  # ── HTTP keep-alive ──────────────────────────────────────
  HTTP_MAX_KEEPALIVE_REQUESTS: "200"
  HTTP_PERSIST_TIMEOUT_S: "30"

  # ── Chaos knobs (set to "true" to activate) ──────────────
  # Connection leak — connections are never returned to pool
  CHAOS_DB_LEAK_ENABLED: "false"
  # Slow query simulation (ms, 0=disabled)
  CHAOS_DB_SLOW_QUERY_MS: "0"
  # Memory leak via unbounded response cache
  CHAOS_MEMORY_CACHE_ENABLED: "false"
  # Objects (64KB each) cached per transaction when cache is on
  CHAOS_MEMORY_OBJECTS_PER_TX: "1"
---
# ============================================================
# Deployment — main application (3 replicas)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberty-perf
  namespace: chaos-test
  labels:
    app: liberty-perf
    version: "1.0.0"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9080"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: liberty-perf
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: liberty-perf
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9080"
    spec:
      # Non-root container as required by security constraints
      # runAsUser / fsGroup are intentionally omitted — OpenShift assigns
      # a UID from the namespace's allowed range automatically.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: liberty-perf
          image: quay.io/causa-ai-hub/liberty-perf:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: liberty-perf-config
          env:
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -XX:+UseContainerSupport
                -XX:MaxRAMPercentage=75
                -Dfile.encoding=UTF-8
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          # Startup probe — give Liberty up to 90s to start
          startupProbe:
            httpGet:
              path: /health/started
              port: 9080
            failureThreshold: 18
            periodSeconds: 5
            timeoutSeconds: 3
          # Liveness probe — restart if heap > 90%
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe — stop traffic if DB is unreachable
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: dumps
              mountPath: /dumps
            - name: logs
              mountPath: /logs
            - name: server-xml
              mountPath: /opt/wlp/usr/servers/defaultServer/server.xml
              subPath: server.xml
              readOnly: true
            - name: jvm-options
              mountPath: /opt/wlp/usr/servers/defaultServer/jvm.options
              subPath: jvm.options
              readOnly: true
      volumes:
        - name: dumps
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: server-xml
          configMap:
            name: liberty-perf-server-xml
            items:
              - key: server.xml
                path: server.xml
        - name: jvm-options
          configMap:
            name: liberty-perf-server-xml
            items:
              - key: jvm.options
                path: jvm.options
---
# ============================================================
# Service — ClusterIP for internal access + Prometheus scraping
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: liberty-perf-svc
  namespace: chaos-test
  labels:
    app: liberty-perf
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9080"
spec:
  selector:
    app: liberty-perf
  ports:
    - name: http
      port: 9080
      targetPort: 9080
      protocol: TCP
  type: ClusterIP
---
# ============================================================
# Route — external HTTP access (OpenShift)
# ============================================================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: liberty-perf
  namespace: chaos-test
  labels:
    app: liberty-perf
spec:
  to:
    kind: Service
    name: liberty-perf-svc
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
# ============================================================
# HorizontalPodAutoscaler — scale based on CPU
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: liberty-perf-hpa
  namespace: chaos-test
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: liberty-perf
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
