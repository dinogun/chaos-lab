---
# ============================================================
# Load Generator — Kubernetes Job
# Deploys alongside the main application to drive HTTP load.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: load-gen-config
  namespace: chaos-test
  labels:
    app: liberty-perf-load-gen
data:
  # Target service (must match Service name in deploy.yaml)
  TARGET_HOST: "liberty-perf-svc"
  TARGET_PORT: "9080"

  # Load profile
  CONCURRENT_USERS: "50"
  DURATION_SECONDS: "600"
  REQUEST_DELAY_MS: "50"

  # Mix: percentage of requests that are booking (airline) vs transaction (banking)
  BOOKING_RATIO: "50"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: liberty-perf-load-gen
  namespace: chaos-test
  labels:
    app: liberty-perf-load-gen
spec:
  # Do not retry on failure — a failed run should be investigated
  backoffLimit: 0
  # Clean up 24h after completion
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: liberty-perf-load-gen
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # ── Init container ────────────────────────────────────────────────────────
      # The WAR stores compiled classes under WEB-INF/classes/.
      # Java cannot load classes directly from a WAR path, so this init
      # container extracts that directory into a shared emptyDir volume.
      # The image is a JRE (no javac/jar tool), so a pre-compiled Extract.class
      # is embedded as a single-line base64 string and decoded at runtime.
      # Extract.class uses only java.util.zip + java.nio from java.base.
      initContainers:
        - name: extract-classes
          image: quay.io/causa-ai-hub/liberty-perf:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              WAR=/opt/wlp/usr/servers/defaultServer/apps/liberty-perf.war
              OUT=/shared/classes
              mkdir -p /tmp/extractor "$OUT"
              echo "" \
                | base64 -d > /tmp/extractor/Extract.class
              java -cp /tmp/extractor Extract "$WAR" "$OUT"
              echo "Init complete. Classes extracted:"
              ls "$OUT/ai/causa/libertyperf/load/"
          volumeMounts:
            - name: shared-classes
              mountPath: /shared
      containers:
        - name: load-gen
          # The load generator is packaged in the same image as the main app.
          # Classes are pre-extracted by the init container into /shared/classes.
          image: quay.io/causa-ai-hub/liberty-perf:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - java
            - -cp
            - /shared/classes
            - ai.causa.libertyperf.load.LoadGenerator
          envFrom:
            - configMapRef:
                name: load-gen-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: shared-classes
              mountPath: /shared
      volumes:
        - name: shared-classes
          emptyDir: {}
